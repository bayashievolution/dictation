<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dictation — リアルタイム文字起こし</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <div class="titlebar-left">
        <span class="app-icon">🎙</span>
        <span class="app-name">dictation</span>
      </div>
      <div class="titlebar-right">
        <span id="status-indicator" class="status idle">待機中</span>
        <button id="btn-pin" class="titlebar-btn" title="常に最前面">📌</button>
        <button id="btn-ghost" class="titlebar-btn" title="半透明">👻</button>
        <button id="btn-minimize" class="titlebar-btn" title="最小化（タスクトレイへ）">―</button>
        <button id="btn-close" class="titlebar-btn titlebar-close" title="閉じる（アプリ終了）">✕</button>
      </div>
    </header>

    <section id="controls">
      <button id="btn-toggle" class="btn btn-primary btn-square" title="録音開始（クリックで開始/停止）">
        <span class="btn-icon">▶</span>
      </button>
      <button id="btn-ai" class="btn btn-ai btn-square active" title="AI整形 ON/OFF">
        <span class="btn-icon">✨</span>
      </button>
      <button id="btn-copy" class="btn btn-secondary btn-square" disabled title="全文をコピー">
        <span class="btn-icon">📋</span>
      </button>
      <button id="btn-export" class="btn btn-ghost btn-square" disabled title="Markdownで保存">
        <span class="btn-icon">💾</span>
      </button>
      <button id="btn-clear" class="btn btn-ghost btn-square" title="このタブをクリア">
        <span class="btn-icon">🗑</span>
      </button>
      <button id="btn-settings" class="btn btn-ghost btn-square" style="margin-left:auto" title="設定">
        <span class="btn-icon">⚙</span>
      </button>
    </section>

    <nav id="tabs">
      <div id="tabs-list"></div>
      <button id="btn-tab-new" class="tab-new" title="新しいタブ">＋</button>
    </nav>

    <main id="transcript">
      <div id="confirmed" contenteditable="true" spellcheck="false"></div>
      <div id="interim"></div>
      <div id="empty-hint" class="empty-hint">
        ▶ 録音開始を押すと文字起こしが始まります<br />
        <small>※ 認識中も本文を直接編集できます。新しい認識結果は末尾に追加されます。</small>
      </div>
    </main>

    <button id="btn-scroll-bottom" class="scroll-bottom hidden" title="最新へ">
      <span>▼</span>
    </button>

    <footer id="footer">
      <small id="session-info">dictation v0.3</small>
    </footer>
  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" data-dismiss></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2>設定</h2>
        <button class="modal-close" data-dismiss>✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">Gemini API キー</span>
          <input id="input-api-key" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false" />
          <small class="field-hint">
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> で取得。無料枠内で運用できます。
          </small>
        </label>
        <label class="field">
          <span class="field-label">無音検出時間（秒）</span>
          <input id="input-silence-sec" type="number" min="1" max="30" step="1" />
          <small class="field-hint">この秒数だけ静かになったら、溜めた発話を Gemini に送って整形します。</small>
        </label>
        <label class="field field-row">
          <input id="input-ai-enabled" type="checkbox" />
          <span>AI整形を有効にする</span>
        </label>
        <label class="field field-row">
          <input id="input-auto-stop" type="checkbox" />
          <span>長時間無音が続いたら停止確認ダイアログを出す</span>
        </label>
        <label class="field">
          <span class="field-label">停止確認までの無音時間（秒）</span>
          <input id="input-auto-stop-sec" type="number" min="30" max="600" step="10" />
        </label>
        <label class="field">
          <span class="field-label">半透明時の不透明度 <small id="opacity-value" style="color:var(--text-faint);">75%</small></span>
          <input id="input-opacity" type="range" min="30" max="100" step="5" />
          <small class="field-hint">👻ボタンで半透明にしたときの濃さ。30%〜100%</small>
        </label>
        <div class="field">
          <span class="field-label">✕ボタンを押したとき</span>
          <label class="field-row" style="margin-bottom:4px">
            <input type="radio" name="close-behavior" id="close-quit" value="quit" />
            <span>アプリを終了する</span>
          </label>
          <label class="field-row" style="margin-bottom:0">
            <input type="radio" name="close-behavior" id="close-tray" value="tray" />
            <span>タスクトレイに格納する（録音継続）</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-settings-save" class="btn btn-primary">保存</button>
        <button class="btn btn-ghost" data-dismiss>キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 無音停止確認ダイアログ -->
  <div id="silence-dialog" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card modal-small">
      <div class="modal-body">
        <p style="font-size:15px; line-height:1.7;">
          しばらく音声が入っていません。<br />
          録音を停止しますか？
        </p>
        <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">
          <span id="silence-countdown"></span>
        </p>
      </div>
      <div class="modal-footer">
        <button id="btn-silence-stop" class="btn btn-primary">停止する</button>
        <button id="btn-silence-continue" class="btn btn-ghost">続ける</button>
      </div>
    </div>
  </div>

  <script src="gemini.js"></script>
  <script src="app.js"></script>
</body>
</html>
