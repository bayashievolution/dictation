<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dictation — リアルタイム文字起こし</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <div class="titlebar-left">
        <span class="app-icon">🎙</span>
        <span class="app-name">dictation</span>
      </div>
      <div class="titlebar-right">
        <span id="status-indicator" class="status idle">待機中</span>
      </div>
    </header>

    <section id="controls">
      <button id="btn-toggle" class="btn btn-primary btn-square" title="録音開始（クリックで開始/停止）">
        <span class="btn-icon">▶</span>
      </button>
      <button id="btn-ai" class="btn btn-ai btn-square active" title="AI整形 ON/OFF">
        <span class="btn-icon">✨</span>
      </button>
      <span class="controls-sep"></span>
      <button id="btn-copy-all-plain" class="btn btn-secondary btn-square" disabled title="全タブをプレーンテキストでコピー">
        <span class="btn-icon">📋</span>
      </button>
      <button id="btn-copy-all-md" class="btn btn-secondary btn-square" disabled title="全タブをMarkdown形式でコピー（Notionは3トグルで復元）">
        <span class="btn-icon">📘</span>
      </button>
      <button id="btn-save-json" class="btn btn-ghost btn-square" title="このセッションをJSON保存">
        <span class="btn-icon">💾</span>
      </button>
      <button id="btn-load-json" class="btn btn-ghost btn-square" title="JSONから復元">
        <span class="btn-icon">📂</span>
      </button>
      <button id="btn-clear-all" class="btn btn-ghost btn-square" title="全タブをクリア">
        <span class="btn-icon">🗑</span>
      </button>
      <button id="btn-settings" class="btn btn-ghost btn-square" style="margin-left:auto" title="設定">
        <span class="btn-icon">⚙</span>
      </button>
      <input type="file" id="file-load" accept=".json" style="display:none" />
    </section>

    <nav id="tabs">
      <div id="tabs-list"></div>
      <button id="btn-tab-new" class="tab-new" title="新しいセッション">＋</button>
    </nav>

    <nav id="inner-tabs">
      <button class="inner-tab active" data-pane="pane-transcript">
        <span class="inner-tab-icon">🎙</span>文字起こし
      </button>
      <button class="inner-tab" data-pane="pane-memo">
        <span class="inner-tab-icon">📝</span>メモ
      </button>
      <button class="inner-tab" data-pane="pane-summary">
        <span class="inner-tab-icon">📄</span>要約
      </button>
    </nav>

    <main id="main-area">
      <div id="pane-transcript" class="pane active">
        <div class="pane-header">
          <button class="pane-btn" data-pane-copy="pane-transcript" title="このタブだけコピー">
            <span>📋</span><span>コピー</span>
          </button>
          <button class="pane-btn" data-pane-clear="pane-transcript" title="このタブだけクリア">
            <span>🗑</span><span>クリア</span>
          </button>
        </div>
        <div class="pane-body">
          <div id="confirmed" contenteditable="true" spellcheck="false"></div>
          <div id="interim"></div>
          <div id="empty-hint" class="empty-hint">
            ▶ 録音開始を押すと文字起こしが始まります<br />
            <small>※ 認識中も本文を直接編集できます。新しい認識結果は末尾に追加されます。</small>
          </div>
        </div>
        <button id="btn-scroll-bottom" class="scroll-bottom hidden" title="最新へ">
          <span>▼</span>
        </button>
      </div>

      <div id="pane-memo" class="pane">
        <div class="pane-header">
          <button class="pane-btn" data-pane-copy="pane-memo" title="このタブだけコピー">
            <span>📋</span><span>コピー</span>
          </button>
          <button class="pane-btn" data-pane-clear="pane-memo" title="このタブだけクリア">
            <span>🗑</span><span>クリア</span>
          </button>
        </div>
        <div class="pane-body">
          <div id="memo" contenteditable="true" spellcheck="false" data-placeholder="ここに自由にメモを書けます。録音中もいつでも。"></div>
        </div>
      </div>

      <div id="pane-summary" class="pane">
        <div class="pane-header">
          <button class="pane-btn" data-pane-copy="pane-summary" title="このタブだけコピー">
            <span>📋</span><span>コピー</span>
          </button>
          <button class="pane-btn" data-pane-clear="pane-summary" title="このタブだけクリア">
            <span>🗑</span><span>クリア</span>
          </button>
          <button id="btn-regenerate-summary" class="pane-btn pane-btn-action" style="margin-left:auto" title="文字起こしから要約を生成">
            <span>✨</span><span>要約を生成</span>
          </button>
        </div>
        <div class="pane-body">
          <div id="summary" contenteditable="true" spellcheck="false"></div>
          <div id="summary-empty" class="empty-hint">
            要約はまだ生成されていません。<br />
            <small>録音停止後に自動生成、または「要約を生成」ボタンで即生成できます。</small>
          </div>
        </div>
      </div>
    </main>

    <footer id="footer">
      <small id="session-info">dictation v0.4 — Web版</small>
    </footer>
  </div>

  <!-- 設定モーダル -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" data-dismiss></div>
    <div class="modal-card">
      <div class="modal-header">
        <h2>設定</h2>
        <button class="modal-close" data-dismiss>✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">Gemini API キー</span>
          <input id="input-api-key" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false" />
          <small class="field-hint">
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> で取得。無料枠内で運用できます。
          </small>
        </label>
        <label class="field">
          <span class="field-label">無音検出時間（秒）</span>
          <input id="input-silence-sec" type="number" min="1" max="30" step="1" />
          <small class="field-hint">この秒数だけ静かになったら、溜めた発話を Gemini に送って整形します。</small>
        </label>
        <label class="field field-row">
          <input id="input-ai-enabled" type="checkbox" />
          <span>AI整形を有効にする</span>
        </label>
        <label class="field field-row">
          <input id="input-auto-stop" type="checkbox" />
          <span>長時間無音が続いたら停止確認ダイアログを出す</span>
        </label>
        <label class="field">
          <span class="field-label">停止確認までの無音時間（秒）</span>
          <input id="input-auto-stop-sec" type="number" min="30" max="600" step="10" />
        </label>
        <label class="field field-row">
          <input id="input-auto-summarize" type="checkbox" />
          <span>録音停止時に自動で要約を生成する</span>
        </label>
      </div>
      <div class="modal-footer">
        <button id="btn-settings-save" class="btn btn-primary">保存</button>
        <button class="btn btn-ghost" data-dismiss>キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 無音停止確認ダイアログ -->
  <div id="silence-dialog" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card modal-small">
      <div class="modal-body">
        <p style="font-size:15px; line-height:1.7;">
          しばらく音声が入っていません。<br />
          録音を停止しますか？
        </p>
        <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">
          <span id="silence-countdown"></span>
        </p>
      </div>
      <div class="modal-footer">
        <button id="btn-silence-stop" class="btn btn-primary">停止する</button>
        <button id="btn-silence-continue" class="btn btn-ghost">続ける</button>
      </div>
    </div>
  </div>

  <script src="gemini.js?v=0.4.4"></script>
  <script src="app.js?v=0.4.4"></script>
</body>
</html>
